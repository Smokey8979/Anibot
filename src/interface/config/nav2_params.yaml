# nav2_params.yaml — Anibot ROS2 Jazzy
# FIXED 2026-03-23
# All changes annotated with [FIX] and reason

amcl:
  ros__parameters:
    use_sim_time: false

    # [FIX] alpha1-5 were all 0.01 — dangerously tight motion model.
    # Your left_scale=0.82 means odom is KNOWN to be inaccurate.
    # alpha=0.01 tells AMCL to trust odometry almost perfectly → it never
    # corrects drift → robot localises wrong → nav goal is in wrong place.
    # Realistic values for a small diff drive with encoder imbalance:
    alpha1: 0.15   # rotation noise from rotation
    alpha2: 0.10   # rotation noise from translation
    alpha3: 0.10   # translation noise from translation
    alpha4: 0.10   # translation noise from rotation
    alpha5: 0.05
    base_frame_id: base_footprint
    global_frame_id: map
    odom_frame_id: odom

    beam_skip_distance: 0.5
    beam_skip_error_threshold: 0.9
    beam_skip_threshold: 0.3
    do_beamskip: false

    lambda_short: 0.1
    laser_likelihood_max_dist: 2.0   # [FIX] 1.5→2.0: 1.5 drops valid hits in a small room
    laser_max_range: 10.0
    laser_min_range: 0.15            # [FIX] 0.1→0.15: avoid near-zero range noise
    laser_model_type: likelihood_field

    max_beams: 180
    min_particles: 500    # [FIX] 1000→500: 1000 particles on Pi5 during nav = CPU lag
    max_particles: 3000   # [FIX] 5000→3000: still accurate, way less Pi5 CPU

    update_min_d: 0.15
    update_min_a: 0.15

    pf_err: 0.05
    pf_z: 0.99
    recovery_alpha_fast: 0.0
    recovery_alpha_slow: 0.0
    resample_interval: 2
    robot_model_type: nav2_amcl::DifferentialMotionModel
    save_pose_rate: 0.5
    sigma_hit: 0.2
    tf_broadcast: true
    transform_tolerance: 0.5

    # [FIX] CRITICAL: z weights MUST sum to exactly 1.0.
    # Old: 0.95+0.05+0.05+0.05 = 1.10 ILLEGAL — breaks AMCL sensor model,
    # particle weights become invalid → bad localisation → random nav behaviour.
    z_hit:   0.85
    z_rand:  0.05
    z_max:   0.05
    z_short: 0.05   # total = 1.00 ✓
    scan_topic: scan

bt_navigator:
  ros__parameters:
    use_sim_time: false
    global_frame: map
    robot_base_frame: base_footprint
    odom_topic: /odom
    bt_loop_duration: 10
    default_server_timeout: 30
    wait_for_service_timeout: 1000
    action_server_result_timeout: 900.0
    navigators:
    - navigate_to_pose
    - navigate_through_poses
    navigate_to_pose:
      plugin: nav2_bt_navigator::NavigateToPoseNavigator
    navigate_through_poses:
      plugin: nav2_bt_navigator::NavigateThroughPosesNavigator

controller_server:
  ros__parameters:
    use_sim_time: false
    controller_frequency: 10.0
    min_x_velocity_threshold: 0.05
    min_y_velocity_threshold: 0.0
    min_theta_velocity_threshold: 0.05
    failure_tolerance: 0.5
    progress_checker_plugin: progress_checker
    goal_checker_plugins:
    - general_goal_checker
    controller_plugins:
    - FollowPath

    progress_checker:
      plugin: nav2_controller::SimpleProgressChecker
      required_movement_radius: 0.1
      movement_time_allowance: 90.0

    general_goal_checker:
      stateful: true
      plugin: nav2_controller::SimpleGoalChecker
      xy_goal_tolerance: 0.20
      yaw_goal_tolerance: 0.30  # [FIX] 0.25→0.30: avoids excessive spin to nail heading

    FollowPath:
      plugin: nav2_regulated_pure_pursuit_controller::RegulatedPurePursuitController
      desired_linear_vel: 0.15   # [FIX] 0.18→0.15: slower = more stable with imperfect odom
      lookahead_dist: 0.4        # [FIX] 0.5→0.4: tighter tracking for small robot
      min_lookahead_dist: 0.25
      max_lookahead_dist: 1.0    # [FIX] 1.5→1.0: less overshoot with uncertain localisation
      lookahead_time: 0.6
      # [FIX] 0.42→0.25: THIS was causing the spin-out / dashing on nav goals.
      # 0.42 rad/s in-place rotation + bad AMCL localisation = overshoot heading,
      # AMCL re-estimates position, RPP re-commands wrong direction, feedback loop
      # → robot spins and dashes out of control.
      rotate_to_heading_angular_vel: 0.25
      transform_tolerance: 0.5
      use_velocity_scaled_lookahead_dist: true
      min_approach_linear_velocity: 0.08  # [FIX] 0.10→0.08: gentler approach to goal
      approach_velocity_scaling_dist: 0.6
      # [FIX] false→true: DANGEROUS to disable — turns off obstacle avoidance in RPP.
      # You will crash into walls without this.
      use_collision_detection: true
      max_allowed_time_to_collision_up_to_carrot: 2.0
      # [FIX] false→true: slows robot on tight curves, critical with wheel imbalance
      use_regulated_linear_velocity_scaling: true
      use_fixed_curvature_lookahead: false  # [FIX] true→false: works better with regulated scaling
      curvature_lookahead_dist: 0.4
      # [FIX] false→true: slow down near high-cost cells (walls/obstacles)
      use_cost_regulated_linear_velocity_scaling: true
      regulated_linear_scaling_min_radius: 0.5  # [FIX] 0.6→0.5
      regulated_linear_scaling_min_speed: 0.08
      use_rotate_to_heading: true
      allow_reversing: false
      # [FIX] 0.35→0.5 rad: don't trigger in-place rotation for tiny heading errors
      rotate_to_heading_min_angle: 0.5
      max_angular_accel: 0.8    # [FIX] 1.0→0.8: smoother turns, less chassis jerk
      max_robot_pose_search_dist: 10.0

local_costmap:
  local_costmap:
    ros__parameters:
      update_frequency: 10.0
      publish_frequency: 5.0
      global_frame: odom
      robot_base_frame: base_footprint
      use_sim_time: false
      rolling_window: true
      width: 3      # [FIX] 4→3: faster costmap updates on Pi5
      height: 3
      resolution: 0.05
      robot_radius: 0.15   # [FIX] 0.13→0.15: small safety margin
      # [FIX] MISSING — caused endless "Timed out waiting for transform from
      # base_footprint to odom" at startup. Arduino reset takes ~4s before the
      # odom frame appears; without this the costmap just errors and never starts.
      transform_tolerance: 0.5
      plugins:
      - voxel_layer
      - inflation_layer
      inflation_layer:
        plugin: nav2_costmap_2d::InflationLayer
        cost_scaling_factor: 3.5   # [FIX] 3.0→3.5
        # [FIX] 0.15→0.20: must be > robot_radius (0.15) or robot clips obstacles
        inflation_radius: 0.20
      voxel_layer:
        plugin: nav2_costmap_2d::VoxelLayer
        enabled: true
        publish_voxel_map: true
        origin_z: 0.0
        z_resolution: 0.05
        z_voxels: 16
        max_obstacle_height: 2.0
        mark_threshold: 0
        observation_sources: scan
        scan:
          topic: /scan
          max_obstacle_height: 2.0
          clearing: true
          marking: true
          data_type: LaserScan
          raytrace_max_range: 3.0
          raytrace_min_range: 0.0
          obstacle_max_range: 2.5
          obstacle_min_range: 0.0
      always_send_full_costmap: true

global_costmap:
  global_costmap:
    ros__parameters:
      update_frequency: 1.0
      publish_frequency: 1.0
      global_frame: map
      robot_base_frame: base_footprint
      use_sim_time: false
      robot_radius: 0.15
      resolution: 0.05
      track_unknown_space: true
      # [FIX] MISSING — caused the endless "Timed out waiting for transform from
      # base_footprint to map" log spam. AMCL needs to broadcast map→odom before
      # global costmap can check that transform. Tolerance lets it wait gracefully.
      transform_tolerance: 0.5
      plugins:
      - static_layer
      - obstacle_layer
      - inflation_layer
      obstacle_layer:
        plugin: nav2_costmap_2d::ObstacleLayer
        enabled: true
        observation_sources: scan
        scan:
          topic: /scan
          max_obstacle_height: 2.0
          clearing: true
          marking: true
          data_type: LaserScan
          raytrace_max_range: 3.0
          raytrace_min_range: 0.0
          obstacle_max_range: 2.5
          obstacle_min_range: 0.0
      static_layer:
        plugin: nav2_costmap_2d::StaticLayer
        map_subscribe_transient_local: true
      inflation_layer:
        plugin: nav2_costmap_2d::InflationLayer
        cost_scaling_factor: 3.5
        inflation_radius: 0.20
      always_send_full_costmap: true

map_server:
  ros__parameters:
    use_sim_time: false
    yaml_filename: ''

map_saver:
  ros__parameters:
    use_sim_time: false
    save_map_timeout: 5.0
    free_thresh_default: 0.25
    occupied_thresh_default: 0.65
    map_subscribe_transient_local: true

planner_server:
  ros__parameters:
    expected_planner_frequency: 10.0
    use_sim_time: false
    planner_plugins:
    - GridBased
    GridBased:
      plugin: nav2_navfn_planner::NavfnPlanner
      tolerance: 0.5    # [FIX] 1.0→0.5: 1m goal tolerance is sloppy for a small room
      use_astar: true   # [FIX] false→true: A* > Dijkstra on small maps
      allow_unknown: true

smoother_server:
  ros__parameters:
    use_sim_time: false
    smoother_plugins:
    - simple_smoother
    simple_smoother:
      plugin: nav2_smoother::SimpleSmoother
      tolerance: 1.0e-10
      max_its: 1000
      do_refinement: true

behavior_server:
  ros__parameters:
    local_costmap_topic: local_costmap/costmap_raw
    global_costmap_topic: global_costmap/costmap_raw
    local_footprint_topic: local_costmap/published_footprint
    global_footprint_topic: global_costmap/published_footprint
    cycle_frequency: 10.0
    behavior_plugins:
    - spin
    - backup
    - drive_on_heading
    - assisted_teleop
    - wait
    spin:
      plugin: nav2_behaviors::Spin
    backup:
      plugin: nav2_behaviors::BackUp
    drive_on_heading:
      plugin: nav2_behaviors::DriveOnHeading
    wait:
      plugin: nav2_behaviors::Wait
    assisted_teleop:
      plugin: nav2_behaviors::AssistedTeleop
    local_frame: odom
    global_frame: map
    robot_base_frame: base_footprint
    transform_tolerance: 0.5  # [FIX] 0.2→0.5: match rest of stack
    use_sim_time: false
    simulate_ahead_time: 2.0
    max_rotational_vel: 0.25   # [FIX] 0.42→0.25: must match RPP rotate_to_heading_angular_vel
    min_rotational_vel: 0.12   # [FIX] 0.20→0.12: less aggressive spin recovery
    rotational_acc_lim: 0.8    # [FIX] 1.0→0.8: match max_angular_accel in RPP

waypoint_follower:
  ros__parameters:
    use_sim_time: false
    loop_rate: 10
    stop_on_failure: false
    action_server_result_timeout: 900.0
    waypoint_task_executor_plugin: wait_at_waypoint
    wait_at_waypoint:
      plugin: nav2_waypoint_follower::WaitAtWaypoint
      enabled: true
      waypoint_pause_duration: 200

velocity_smoother:
  ros__parameters:
    use_sim_time: false
    smoothing_frequency: 10.0
    scale_velocities: false
    feedback: OPEN_LOOP
    # [FIX] All limits aligned with RPP and behavior_server above.
    # Old: max linear=0.21 (above RPP's 0.15), max angular=0.42 (way above RPP's 0.25)
    # Mismatched limits mean velocity_smoother clips/fights RPP commands → jerky motion.
    max_velocity:
    - 0.18   # match desired_linear_vel in RPP
    - 0.0
    - 0.30   # slight headroom above RPP rotate_to_heading_angular_vel (0.25)
    min_velocity:
    - -0.18
    - 0.0
    - -0.30
    max_accel:
    - 0.4    # [FIX] 0.5→0.4: gentler linear accel
    - 0.0
    - 0.8    # [FIX] 1.0→0.8: match rotational_acc_lim
    max_decel:
    - -0.4
    - 0.0
    - -0.8
    odom_topic: odom
    odom_duration: 0.1
    deadband_velocity:
    - 0.0
    - 0.0
    - 0.0
    velocity_timeout: 1.0
